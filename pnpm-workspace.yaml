packages:
  - 'packages/*'
  - 'apps/*'

allowBuilds:
  argon2: true
  cpu-features: false
  esbuild: false
  protobufjs: false
  sharp: true
  ssh2: false
  unrs-resolver: true

catalog:
  turbo: ^2.9.16
  typescript: ^6.0.3
  tsup: ^8.5.1
  vitest: ^4.1.7
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  postgres: ^3.4.9
  pg: ^8.21.0
  "@biomejs/biome": 2.4.15
  "@types/node": 25.9.1
  "kafkajs": "^2.2.4"
  "zod": "^3.25.76"
  "dotenv": "^17.4.2"
  "tsx": "^4.22.4"

minimumReleaseAgeExclude:
  - react-dom@19.2.7
  - react@19.2.7
  - shadcn@4.11.0
